<header
  class="mx-auto flex max-w-6xl flex-col gap-4 px-6 pt-5 md:flex-row md:items-center md:justify-between"
  [class.hidden]="isHidden()"
>
  <div class="flex min-w-0 items-center gap-3 cursor-pointer" [routerLink]="['/']">
    <div
      class="grid size-11 place-items-center rounded-full border border-slate-200/15 bg-slate-900/50 text-sm font-bold tracking-wide text-slate-100 shadow-[0_10px_30px_rgba(0,0,0,0.35)]"
      aria-hidden="true"
    >
      TQ
    </div>
    <div class="min-w-0">
      <div class="text-base font-semibold leading-tight">Ticket Queue</div>
      <div class="mt-0.5 text-xs leading-tight text-slate-300/80">
        Sistema de turnos: kiosco, visor y escritorio
      </div>
    </div>
  </div>

  <nav
    class="flex w-full items-center justify-between gap-1 rounded-full border border-slate-200/15 bg-slate-900/35 p-1.5 backdrop-blur md:w-auto md:justify-start"
    aria-label="Navegación principal"
  >
    <a
      class="inline-flex items-center justify-center rounded-full px-3.5 py-2.5 text-sm font-medium leading-none text-slate-200/95 hover:bg-white/10 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-300/70"
      routerLink="/kiosk"
      routerLinkActive="bg-white/10 text-white"
      [routerLinkActiveOptions]="{ exact: true }"
    >
      Solicitar
    </a>
    <a
      class="inline-flex items-center justify-center rounded-full px-3.5 py-2.5 text-sm font-medium leading-none text-slate-200/95 hover:bg-white/10 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-300/70"
      routerLink="/board"
      routerLinkActive="bg-white/10 text-white"
    >
      Visor
    </a>
    <a
      class="inline-flex items-center justify-center rounded-full px-3.5 py-2.5 text-sm font-medium leading-none text-slate-200/95 hover:bg-white/10 focus-visible:outline-2 focus-visible:outline-offset-2 focus-visible:outline-sky-300/70"
      routerLink="/desk-select"
      routerLinkActive="bg-white/10 text-white"
    >
      Escritorio
    </a>
  </nav>
</header>
